<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid ul Adha - Interactive Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" src="u_mr84lzw2xf-eid-mubarak-201252.mp3" loop></audio>

    <div class="eid-card" id="mainCard">
        <div class="speech-bubble" id="speechBubble">Click anywhere to start & click animals to listen!</div>

        <div class="animal-sheep" id="sheep" onclick="interact('sheep', event)"></div>
        <div class="animal-camel" id="camel" onclick="interact('camel', event)"></div>
        <div class="animal-cow" id="cow" onclick="interact('cow', event)"></div>

        <div class="instruction">Click anywhere for Music! Click animals for Voice! 🐐 🐪 🐄</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
