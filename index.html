<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid ul Adha - Interactive Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="eid-card">
        <div class="speech-bubble" id="speechBubble">Click an animal to listen!</div>

        <div class="animal-sheep" id="sheep" onclick="interact('sheep')"></div>
        <div class="animal-camel" id="camel" onclick="interact('camel')"></div>
        <div class="animal-cow" id="cow" onclick="interact('cow')"></div>

        <div class="instruction">Click on any animal! 🐐 🐪 🐄</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
